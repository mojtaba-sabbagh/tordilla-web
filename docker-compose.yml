version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tordilla-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SITE_URL: "https://tordillafood.com"
      WORDPRESS_API_URL: "https://tordillafood.com"
      PORT: "3000"
    restart: unless-stopped
